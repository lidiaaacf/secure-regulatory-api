name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:

env:
  ALLOWED_API_KEYS: '["${{ secrets.API_KEY_1 }}","${{ secrets.API_KEY_2 }}"]'

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install linters
        run: pip install black flake8

      - name: Run linters
        run: |
          black --check .
          flake8 app tests

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        run: pytest --cov=app --cov-fail-under=85

  sast:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r app -lll

  dependency_scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit

  docker_build_push:
    runs-on: ubuntu-latest
    needs: [test, sast, dependency_scan]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            --tag myorg/secure-regulatory-api:${{ github.sha }} \
            -f Dockerfile .

      - name: Scan image with Trivy
        uses: aquasec/trivy-action@v2
        with:
          image-ref: myorg/secure-regulatory-api:${{ github.sha }}
          format: table
          exit-code: 1

      - name: Push image
        run: docker push myorg/secure-regulatory-api:${{ github.sha }}