name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:

env:
  ALLOWED_API_KEYS: '["${{ secrets.API_KEY_1 }}","${{ secrets.API_KEY_2 }}"]'

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - name: Install linters
        run: pip install flake8 black
      - name: Run linters
        run: |
          black --check .
          flake8 app tests

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests with coverage
        run: pytest --cov=app --cov-fail-under=85

  sast:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Cache Bandit
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-bandit-${{ hashFiles('**/requirements.txt') }}
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit SAST
        run: bandit -r app -lll

  dast:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Cache Pip Audit
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-audit-${{ hashFiles('**/requirements.txt') }}
      - name: Install Pip Audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: pip-audit --fail-on high

  docker_build_push:
    runs-on: ubuntu-latest
    needs: [test, sast, dast]
    steps:
      - uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            --cache-from=type=registry,ref=myorg/secure-regulatory-api:latest \
            --tag myorg/secure-regulatory-api:${{ github.sha }} \
            -f Dockerfile .

      - name: Scan Docker Image with Trivy
        uses: aquasec/trivy-action@v2
        with:
          image-ref: myorg/secure-regulatory-api:${{ github.sha }}
          format: table
          exit-code: 1

      - name: Push Docker Image
        run: docker push myorg/secure-regulatory-api:${{ github.sha }}